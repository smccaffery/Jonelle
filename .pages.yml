{
  "content": [
    {
      "label": "Blog Posts",
      "type": "collection",
      "path": "blog",
      "format": "json",
      "slug": "{{title}}",
      "fields": [
        {
          "name": "title",
          "label": "Title",
          "type": "string"
        },
        {
          "name": "date",
          "label": "Date",
          "type": "date"
        },
        {
          "name": "excerpt",
          "label": "Short Summary",
          "type": "text"
        },
        {
          "name": "body",
          "label": "Post Content",
          "type": "rich-text"
        }
      ]
    }
  ]
}